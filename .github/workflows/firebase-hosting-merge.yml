name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Forzamos el uso de Node 24 para evitar el error de "deprecated"
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # HEMOS QUITADO la línea de "npm ci && npm run build" porque no la necesitas
      
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ZELVA_C6143 }}
          channelId: live
          projectId: zelva-c6143